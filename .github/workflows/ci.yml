name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omniwa_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omniwa_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5.1.0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          # Exercise the declared compatibility line without pinning CI to the
          # vulnerable initial 1.25.0 toolchain release.
          go-version: 1.25.x
          check-latest: true
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test with PostgreSQL
        env:
          TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/omniwa_ci?sslmode=disable
        run: go test ./... -count=1

      - name: Test with race detector
        run: go test -race ./...

      - name: Check reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Check Swagger drift
        run: |
          go run github.com/swaggo/swag/cmd/swag@v1.16.3 init \
            -g cmd/evolution-go/main.go \
            -o ./docs \
            --parseDependency \
            --parseInternal
          git diff --exit-code -- docs

      - name: Check committed secrets
        run: >-
          go run github.com/zricethezav/gitleaks/v8@v8.30.1 dir
          --redact
          --exit-code 1
          .

      - name: Check release automation
        run: |
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          bash -n scripts/ci/*.sh
          if bash scripts/ci/verify-image.sh example.invalid/image:latest 0000000000000000000000000000000000000000 0.0.0 >/dev/null 2>&1; then
            echo "verify-image accepted a mutable tag" >&2
            exit 1
          fi
          if bash scripts/ci/promote-image.sh example.invalid/image not-a-version >/dev/null 2>&1; then
            echo "promote-image accepted an invalid release tag" >&2
            exit 1
          fi

      - name: Smoke test container startup
        env:
          SOURCE_SHA: ${{ github.sha }}
          SMOKE_VERSION: ci-smoke
          SMOKE_API_KEY: omniwa-container-smoke-key
        run: bash scripts/ci/container-smoke.sh
