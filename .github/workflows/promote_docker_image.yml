name: Promote Docker Image

on:
  release:
    types: [published]

concurrency:
  group: promote-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote existing digest
    if: github.repository == 'hiepknor/omniwa-go'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release history
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote release alias without rebuilding
        env:
          IMAGE_NAME: ghcr.io/hiepknor/omniwa-go
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash scripts/ci/promote-image.sh "$IMAGE_NAME" "$RELEASE_TAG"
