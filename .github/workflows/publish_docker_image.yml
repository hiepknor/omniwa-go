name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

concurrency:
  group: publish-main
  cancel-in-progress: true

jobs:
  build_deploy:
    name: Build immutable image
    # Only publish from this fork; skip on any further fork so it never fails there.
    if: github.repository == 'hiepknor/omniwa-go'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION 2>/dev/null || echo '0.0.0')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hiepknor/omniwa-go
          tags: |
            type=sha,format=long,prefix=sha-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            REVISION=${{ github.sha }}

      - name: Record immutable image
        env:
          IMAGE_DIGEST: ${{ steps.docker_build.outputs.digest }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          echo "### Immutable image" >> "$GITHUB_STEP_SUMMARY"
          printf '`%s@%s`\n' 'ghcr.io/hiepknor/omniwa-go' "$IMAGE_DIGEST" >> "$GITHUB_STEP_SUMMARY"
          echo "Source revision: \`$SOURCE_SHA\`" >> "$GITHUB_STEP_SUMMARY"
