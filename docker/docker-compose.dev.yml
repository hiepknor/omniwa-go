# Dev stack for OmniWA GO.
#
# Runs the published image ghcr.io/hiepknor/omniwa-go together with Postgres,
# RabbitMQ and MinIO. The license gate is disabled (LICENSE_GATE_ENABLED=false)
# so the API is usable immediately without activation.
#
# Requires the ghcr.io/hiepknor/omniwa-go package to be public (Repo > Packages >
# omniwa-go > Package settings > Change visibility > Public). Otherwise run
# `docker login ghcr.io -u hiepknor` with a read:packages token first.
#
# Usage (from this docker/ directory):
#   docker compose -f docker-compose.dev.yml up -d
#   curl http://localhost:4000/health
#
# Pin a specific version by setting IMAGE_TAG (defaults to latest):
#   IMAGE_TAG=0.7.2 docker compose -f docker-compose.dev.yml up -d

# Compose project name (the "stack" shown in Docker Desktop). Without this,
# Compose falls back to the directory name ("docker"). Kept distinct from the
# production stack (omniwa-go) so dev and prod can run side by side.
name: omniwa-dev

services:
  omniwa-go:
    image: ghcr.io/hiepknor/omniwa-go:${IMAGE_TAG:-latest}
    container_name: omniwa-go
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Server
      SERVER_PORT: 4000
      CLIENT_NAME: "omniwa"
      OS_NAME: "OmniWA GO"

      # Run without the license activation gate / remote heartbeat.
      LICENSE_GATE_ENABLED: "false"

      # Security — change this for anything beyond local dev.
      GLOBAL_API_KEY: "dev-global-api-key-change-me"

      # PostgreSQL (databases are auto-created on startup)
      POSTGRES_AUTH_DB: "postgresql://postgres:postgres@postgres:5432/omniwa_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://postgres:postgres@postgres:5432/omniwa_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "true"

      # Logs
      WADEBUG: "DEBUG"
      LOGTYPE: "console"
      LOG_DIRECTORY: "/app/logs"

      # Connection
      CONNECT_ON_STARTUP: "false"
      WEBHOOK_FILES: "true"

      # RabbitMQ
      AMQP_URL: "amqp://admin:admin@rabbitmq:5672/default"
      AMQP_GLOBAL_ENABLED: "true"
      AMQP_GLOBAL_EVENTS: "messages.upsert,messages.update,connection.update"
      AMQP_SPECIFIC_EVENTS: ""

      # NATS (disabled — no nats service in this stack)
      NATS_URL: ""
      NATS_GLOBAL_ENABLED: "false"

      # MinIO
      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "omniwa-media"
      MINIO_USE_SSL: "false"
      MINIO_REGION: "us-east-1"

      # Events
      EVENT_IGNORE_GROUP: "false"
      EVENT_IGNORE_STATUS: "true"

      # QR Code
      QRCODE_MAX_COUNT: "5"

      # User existence check
      CHECK_USER_EXISTS: "true"
    volumes:
      - omniwa_data:/app/dbdata
      - omniwa_logs:/app/logs
    networks:
      - omniwa_network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: omniwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - omniwa_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: omniwa-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: default
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - omniwa_network

  minio:
    image: minio/minio:latest
    container_name: omniwa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - omniwa_network

volumes:
  omniwa_data:
    driver: local
  omniwa_logs:
    driver: local
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  omniwa_network:
    driver: bridge
